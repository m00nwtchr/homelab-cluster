# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/cluster.x-k8s.io/cluster_v1beta1.json
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: umbra
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 10.45.0.0/16
    serviceDomain: cluster.local
    services:
      cidrBlocks:
        - 10.46.0.0/16
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: KThreesControlPlane
    name: umbra-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: MicrovmCluster
    name: umbra
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/cluster.x-k8s.io/machinedeployment_v1beta1.json
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: umbra-md-0
  namespace: default
spec:
  clusterName: umbra
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: umbra
      cluster.x-k8s.io/deployment-name: umbra-md-0
  template:
    metadata:
      labels:
        cluster.x-k8s.io/deployment-name: umbra-md-0
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: KThreesConfigTemplate
          name: umbra-md-0
      clusterName: umbra
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: MicrovmMachineTemplate
        name: umbra-md-0
      version: v1.30.2
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/controlplane.cluster.x-k8s.io/kthreescontrolplane_v1beta2.json
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KThreesControlPlane
metadata:
  name: umbra-control-plane
  namespace: default
spec:
  kthreesConfigSpec:
    serverConfig:
      tlsSan:
        - 0.0.0.0
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: DockerMachineTemplate
      name: umbra-control-plane
  replicas: 1
  version: v1.30.2
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/infrastructure.cluster.x-k8s.io/microvmcluster_v1alpha1.json
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MicrovmCluster
metadata:
  name: umbra
  namespace: default
spec:
  controlPlaneEndpoint:
    host: 192.168.0.125
    port: 6443
  placement:
    staticPool:
      hosts:
        - controlplaneAllowed: true
          endpoint: 127.0.0.1:9090
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/infrastructure.cluster.x-k8s.io/microvmmachinetemplate_v1alpha1.json
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MicrovmMachineTemplate
metadata:
  name: umbra-control-plane
  namespace: default
spec:
  template:
    spec:
      kernel:
        filename: boot/vmlinux
        image: ghcr.io/liquidmetal-dev/kernel-bin:5.10.77
      kernelCmdline: {}
      memoryMb: 2048
      networkInterfaces:
        - guestDeviceName: eth1
          type: macvtap
      rootVolume:
        id: root
        image: ghcr.io/liquidmetal-dev/capmvm-kubernetes:1.23.5
      vcpu: 2
      volumes:
        - id: modules
          image: ghcr.io/liquidmetal-dev/kernel-modules:5.10.77
          mountPoint: /lib/modules/5.10.77
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/infrastructure.cluster.x-k8s.io/microvmmachinetemplate_v1alpha1.json
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MicrovmMachineTemplate
metadata:
  name: umbra-md-0
  namespace: default
spec:
  template:
    spec:
      kernel:
        filename: boot/vmlinux
        image: ghcr.io/liquidmetal-dev/kernel-bin:5.10.77
      kernelCmdline: {}
      memoryMb: 2048
      networkInterfaces:
        - guestDeviceName: eth1
          type: macvtap
      rootVolume:
        id: root
        image: ghcr.io/liquidmetal-dev/capmvm-kubernetes:1.23.5
      vcpu: 2
      volumes:
        - id: modules
          image: ghcr.io/liquidmetal-dev/kernel-modules:5.10.77
          mountPoint: /lib/modules/5.10.77
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/bootstrap.cluster.x-k8s.io/kthreesconfigtemplate_v1beta2.json
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KThreesConfigTemplate
metadata:
  name: umbra-md-0
  namespace: default
spec:
  template:
    spec: null
