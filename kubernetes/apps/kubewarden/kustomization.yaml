---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubewarden
components:
  - ../../components/common
resources:
  - ./kubewarden/ks.yaml
patches:
  - target:
      kind: Namespace
    patch: |-
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: restricted
