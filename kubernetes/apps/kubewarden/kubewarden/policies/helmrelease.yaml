---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kubewarden-defaults
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 3.11.1
  url: oci://ghcr.io/kubewarden/charts/kubewarden-defaults
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/kubewarden/helm-charts.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kubewarden-defaults
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    policyServer:
      env:
        - name: KUBEWARDEN_BIND_ADDRESS
          value: "[::]"

    recommendedPolicies:
      enabled: true
      skipAdditionalNamespaces:
        - openebs-system
        - kubevirt
        - observability-privileged
