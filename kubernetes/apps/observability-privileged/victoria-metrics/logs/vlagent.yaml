---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/operator.victoriametrics.com/vlagent_v1.json
apiVersion: operator.victoriametrics.com/v1
kind: VLAgent
metadata:
  name: vl
spec:
  configReloaderExtraArgs:
    enableTCP6: "true"
  extraArgs:
    enableTCP6: "true"
  k8sCollector:
    enabled: true
    excludeFilter: |-
      kubernetes.pod_name:="%{HOSTNAME}" OR (
        "kubernetes.pod_annotations.logging.vlagent.io/exclude-main":="true" AND (
          (
            "kubernetes.pod_annotations.logging.vlagent.io/main-container":* AND
            kubernetes.container_name:eq_field("kubernetes.pod_annotations.logging.vlagent.io/main-container")
          ) OR (
            !"kubernetes.pod_annotations.logging.vlagent.io/main-container":* AND
            kubernetes.container_name:="app"
          )
        )
      )
  extraEnv:
    - name: HOSTNAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
  remoteWrite:
    - url: http://vlsingle-vl.observability.svc.cluster.local.:9428/internal/insert
