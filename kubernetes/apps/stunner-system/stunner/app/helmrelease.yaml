#   url: oci://ghcr.io/m00nwtchr/charts/stunner
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stunner
spec:
  interval: 5m
  chart:
    spec:
      chart: stunner
      version: 1.2.0
      sourceRef:
        kind: HelmRepository
        name: *app
  # chartRef:
  #   kind: OCIRepository
  #   name: *app
  values:
    standardCrds:
      enabled: false

    stunnerGatewayOperator:
      dataplane:
        spec:
          enableMetricsEndpoint: true

    resources:
      limits:
        cpu: 2
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 128Mi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: stunner-gateway-operator-controller-manager
            patch: |-
              - op: replace
                path: /spec/template/spec/containers/0/env/0
                value:
                  name: STUNNER_GATEWAY_OPERATOR_ADDRESS
                  value: stunner-config-discovery.stunner-system.svc.cluster.local.
