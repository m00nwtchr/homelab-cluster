---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stunner
spec:
  interval: 1h
  url: https://l7mp.io/stunner
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stunner
spec:
  interval: 5m
  chart:
    spec:
      chart: stunner
      version: 1.1.0
      sourceRef:
        kind: HelmRepository
        name: *app
  install:
    skipCRDs: true
  values:
    stunnerGatewayOperator:
      dataplane:
        spec:
          enableMetricsEndpoint: true

    resources:
      limits:
        cpu: 2
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 128Mi
