---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: stunner
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.1.0
  url: oci://ghcr.io/m00nwtchr/charts/stunner
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stunner
spec:
  interval: 5m
  # chart:
  #   spec:
  #     chart: stunner
  #     version: 1.1.0
  #     sourceRef:
  #       kind: HelmRepository
  #       name: *app
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    skipCRDs: true
  values:
    stunnerGatewayOperator:
      dataplane:
        spec:
          enableMetricsEndpoint: true

    resources:
      limits:
        cpu: 2
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 128Mi
