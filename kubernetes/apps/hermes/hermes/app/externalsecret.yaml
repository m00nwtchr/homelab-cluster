---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
  dataFrom:
    - find:
        path: /hermes
    - find:
        path: /minimax
    - find:
        path: /memini
