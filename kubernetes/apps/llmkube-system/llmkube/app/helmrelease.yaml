---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: llmkube
spec:
  interval: 1h
  url: https://defilantech.github.io/LLMKube
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llmkube
spec:
  interval: 30m
  chart:
    spec:
      chart: *app
      version: 0.8.7
      sourceRef:
        kind: HelmRepository
        name: *app

  values:
    crds:
      install: true
      keep: true

    controllerManager:
      resources:
        requests:
          cpu: 10m
          memory: 78Mi
        limits:
          memory: 90Mi

    prometheus:
      serviceMonitor:
        enabled: true
      inferencePodMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        namespace: observability

    modelCache:
      size: 100Gi
