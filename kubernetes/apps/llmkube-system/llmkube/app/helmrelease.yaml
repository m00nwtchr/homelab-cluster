---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: llmkube
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.9.8
  url: oci://ghcr.io/defilantech/charts/llmkube
  # verify:
  #   provider: cosign
  #   matchOIDCIdentity:
  #     - issuer: "^https://token.actions.githubusercontent.com$"
  #       subject: "^https://github.com/defilantech/LLMKube.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llmkube
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    crds:
      install: true
      keep: true

    controllerManager:
      resources:
        requests:
          cpu: 10m
          memory: 78Mi
        limits:
          memory: 90Mi

    prometheus:
      serviceMonitor:
        enabled: true
      inferencePodMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        namespace: observability

    modelCache:
      size: 100Gi
