---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gotosocial
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    defaultPodOptions:
      annotations:
        logging.vlagent.io/exclude-main: "true"
        instrumentation.opentelemetry.io/inject-sdk: observability/instrumentation

    controllers:
      *app :
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          main:
            image:
              repository: docker.io/superseriousbusiness/gotosocial
              tag: 0.22.0@sha256:2a59e8d70c70ec51322a5be0bc5090a67eb55ea93f1fe556012192661ebe905f
            env:
              TZ: ${TZ}
              GTS_HOST: gts.${MAIN_DOMAIN}
              GTS_ACCOUNT_DOMAIN: ${MAIN_DOMAIN}
              GTS_BIND_ADDRESS: "::"
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_SEMAPHORE_URL: https://phanpy.${MAIN_DOMAIN}
              GTS_LANDING_PAGE_USER: "m00n"
              GTS_METRICS_ENABLED: "true"
              GTS_TRUSTED_PROXIES: "127.0.0.1/32,::1,2001:cafe:42::/56"
              # GTS_ADVANCED_RATE_LIMIT_EXCEPTIONS: "192.168.1.0/24"
              GTS_ACCOUNTS_ALLOW_CUSTOM_CSS: "true"
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "Kanidm"
              GTS_OIDC_ISSUER: "https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}"
              GTS_OIDC_SCOPES: "openid,email,profile,groups"
              GTS_OIDC_LINK_EXISTING: "true"
              GTS_OIDC_ADMIN_GROUPS: "admins@idm.${SECRET_DOMAIN}"
              GTS_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-id
              GTS_OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-secret
              GTS_DB_TYPE: postgres
              GTS_DB_POSTGRES_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url
            resources:
              requests:
                cpu: 77m
              # limits:
              #   memory: 512Mi
                memory: 422Mi
              limits:
                memory: 422Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: [ALL]}

    persistence:
      storage:
        existingClaim: *app
        globalMounts:
          - subPath: data
            path: /storage
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: 8080
          metrics:
            port: 9464

    route:
      app:
        parentRefs:
          - name: internal
            namespace: network
          - name: tunnel
            namespace: network
        hostnames:
          - gts.${MAIN_DOMAIN}
        rules:
          - backendRefs:
              - identifier: app
                port: 80
            # filters:
            #   - cors:
            #       allowHeaders:
            #         - "*"
            #       allowMethods:
            #         - "*"
            #       allowOrigins:
            #         - "*"
            #       maxAge: 86400
            #     type: CORS
      well-known:
        parentRefs:
          - name: internal
            namespace: network
          - name: tunnel
            namespace: network
        hostnames: ["${MAIN_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: 80
            matches:
              - path:
                  type: Exact
                  value: /.well-known/webfinger
              - path:
                  type: Exact
                  value: /.well-known/nodeinfo
              - path:
                  type: Exact
                  value: /.well-known/host-meta

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
