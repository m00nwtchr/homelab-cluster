---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app phanpy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      *app :
        containers:
          main:
            image:
              repository: ghcr.io/jjgadgets/phanpy
              tag: 2026.01.31.8b98d5a@sha256:dc40489af8056ff6aa3c390913f06346504a1f2a91297d503f4310a3b4bd43ee
            env:
              PHANPY_WEBSITE: "{{ .Release.Name }}.${MAIN_DOMAIN}"
              PHANPY_DEFAULT_INSTANCE: "gts.${MAIN_DOMAIN}"
            resources:
              requests:
                cpu: 10m
              # limits:
              #   memory: 512Mi
    service:
      main:
        controller: phanpy
        ports:
          http:
            port: 80
            targetPort: 8080
    route:
      app:
        parentRefs:
          - name: external
            namespace: network
          - name: internal
            namespace: network
        hostnames:
          - "{{ .Release.Name }}.${MAIN_DOMAIN}"
