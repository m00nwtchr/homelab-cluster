---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kro.run/resourcegraphdefinition_v1alpha1.json
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kopiurbackup
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  schema:
    apiVersion: v1alpha1
    kind: KopiurBackup
    scope: Namespaced
    spec:
      scope: string | enum="local,remote,both" default="both"
      create: boolean | default=true
      copyMethod: string | enum="Snapshot,Direct" default="Snapshot"
      remoteDeepVerify: boolean | default=true
      pvcName: "string | default=${schema.metadata.name}"
      capacity: string | default="5Gi"
      storageClass: string | default="zfs-spark"
      accessModes: '[]string | default=["ReadWriteOnce"]'
      snapshotClass: string | default="csi-zfs"
      puid: integer | default=1000
      pgid: integer | default=1000
      # Schema gotcha (Task 1 finding A): kro SimpleSchema's `enum{...}` is
      # rejected at admission; use `string | enum="a,b,c" default="x"`.
      # `create` (default true) opts in/out of the RGD managing the PVC.
      # When false, consumers own the PVC themselves (the Restore and
      # snapshot policy/schedule still run; the externally-managed PVC
      # must carry dataSourceRef pointing at the Restore).
      # `copyMethod` (default "Snapshot") chooses between CSI-snapshot
      # and Direct (live mount) staging. Set to "Direct" for PVCs that
      # lack a StorageClass/CSI provisioner annotation (e.g. pre-bound
      # PVs created with `volumeName:`); kopiur's default `Snapshot`
      # otherwise requires the source PVC to advertise a CSI provisioner.
      # `remoteDeepVerify` (default true) toggles the daily deep-verify
      # job on the remote (b2) SnapshotPolicy. Local snapshot policy is
      # unaffected. Useful for big/expensive-to-read PVCs where the
      # nightly full-content checksum pass would saturate the network.
  resources:
    - id: pvc
      includeWhen:
        - ${schema.spec.create}
      template:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.pvcName}
          annotations:
            kustomize.toolkit.fluxcd.io/prune: disabled
        spec:
          accessModes: ${schema.spec.accessModes}
          dataSourceRef:
            apiGroup: kopiur.home-operations.com
            kind: Restore
            name: ${restore.metadata.name}
          resources:
            requests:
              storage: ${schema.spec.capacity}
          storageClassName: ${schema.spec.storageClass}
    - id: restore
      includeWhen:
        - ${schema.spec.create}
      template:
        apiVersion: kopiur.home-operations.com/v1alpha1
        kind: Restore
        metadata:
          name: ${schema.metadata.name}
        spec:
          policy: { onMissingSnapshot: Continue }
          source:
            fromPolicy:
              name: '${schema.spec.scope == "remote" ? schema.metadata.name + "-b2" : schema.metadata.name}'
              offset: 0
          target: { populator: {} }
          mover:
            securityContext:
              runAsNonRoot: true
              runAsUser: ${schema.spec.puid}
              runAsGroup: ${schema.spec.pgid}
            podSecurityContext:
              fsGroup: ${schema.spec.pgid}
              fsGroupChangePolicy: OnRootMismatch
    - id: localPolicy
      includeWhen:
        - ${schema.spec.scope == "local" || schema.spec.scope == "both"}
      template:
        apiVersion: kopiur.home-operations.com/v1alpha1
        kind: SnapshotPolicy
        metadata: { name: "${schema.metadata.name}" }
        spec:
          copyMethod: ${schema.spec.copyMethod}
          repository: { kind: ClusterRepository, name: garage }
          retention: { keepDaily: 7, keepHourly: 24 }
          compression: { compressor: zstd }
          defaultDeletionPolicy: Retain
          sources:
            - pvc: { name: "${schema.spec.pvcName}" }
          verification:
            deep:
              capacity: ${schema.spec.capacity}
              schedule: { cron: "H 5 1 * *" }
            quick:
              schedule: { cron: "H 3 * * *" }
          volumeSnapshotClassName: ${schema.spec.snapshotClass}
          mover:
            securityContext:
              runAsNonRoot: true
              runAsUser: ${schema.spec.puid}
              runAsGroup: ${schema.spec.pgid}
            podSecurityContext:
              fsGroup: ${schema.spec.pgid}
              fsGroupChangePolicy: OnRootMismatch
    - id: localSchedule
      includeWhen:
        - ${schema.spec.scope == "local" || schema.spec.scope == "both"}
      template:
        apiVersion: kopiur.home-operations.com/v1alpha1
        kind: SnapshotSchedule
        metadata: { name: "${schema.metadata.name}" }
        spec:
          policyRef: { name: "${localPolicy.metadata.name}" }
          schedule: { cron: "H * * * *" }
    - id: remotePolicy
      includeWhen:
        - ${schema.spec.scope == "remote" || schema.spec.scope == "both"}
      template:
        apiVersion: kopiur.home-operations.com/v1alpha1
        kind: SnapshotPolicy
        metadata: { name: '${schema.metadata.name + "-b2"}' }
        spec:
          copyMethod: ${schema.spec.copyMethod}
          repository: { kind: ClusterRepository, name: b2 }
          retention: { keepDaily: 7 }
          compression: { compressor: zstd }
          defaultDeletionPolicy: Retain
          sources:
            - pvc: { name: "${schema.spec.pvcName}" }
          verification:
            # deep: '${schema.spec.remoteDeepVerify ? {"capacity": schema.spec.capacity, "schedule": {"cron": "H 5 1 * *"}} : {}}'
            quick:
              schedule: { cron: "H 3 * * *" }
          volumeSnapshotClassName: ${schema.spec.snapshotClass}
          identity:
            username: ${schema.metadata.name}
          mover:
            securityContext:
              runAsNonRoot: true
              runAsUser: ${schema.spec.puid}
              runAsGroup: ${schema.spec.pgid}
            podSecurityContext:
              fsGroup: ${schema.spec.pgid}
              fsGroupChangePolicy: OnRootMismatch
    - id: remoteSchedule
      includeWhen:
        - ${schema.spec.scope == "remote" || schema.spec.scope == "both"}
      template:
        apiVersion: kopiur.home-operations.com/v1alpha1
        kind: SnapshotSchedule
        metadata: { name: '${schema.metadata.name + "-b2"}' }
        spec:
          policyRef: { name: "${remotePolicy.metadata.name}" }
          schedule: { cron: "H 0 * * *" }
