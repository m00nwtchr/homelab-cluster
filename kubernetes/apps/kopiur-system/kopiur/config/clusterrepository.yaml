---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: garage
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      auth:
        secretRef:
          name: kopiur-garage-secret
      bucket: kopia
      endpoint: garage.garage.svc.cluster.local:3900
      region: garage
      tls:
        disableTls: true
  encryption:
    passwordSecretRef:
      name: kopiur-garage-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  # Workaround for the scan-request-token livelock in kopiur 0.8.0
  # (home-operations/kopiur#278 fixed the *timed-refresh* arm of
  # bootstrap_recycle_due; the *scan-request* arm still recycles a finished
  # bootstrap Job on any token/honored mismatch). Adoption-stamp churn from 29
  # SnapshotPolicies wins the race against the ClusterRepository's honored
  # write, so the garage-bootstrap Job gets recreated every ~15-20s and
  # scanRequestHonored never catches up. Disabling auto-adoption at the repo
  # level is the middle link in `effective_adoption(policy, repo)` — policies
  # don't need to be touched. Revert once kopiur 0.8.1+ ships a fix for the
  # scan-request arm (currently unfixed on main).
  catalog:
    adoption: Ignore
  moverDefaults:
    cache:
      capacity: 2Gi
      mode: Ephemeral
      storageClassName: zfs-spark
    podSecurityContext:
      fsGroup: 65532
      fsGroupChangePolicy: OnRootMismatch
    scratch:
      capacity: 1Gi
      storageClassName: zfs-spark
    securityContext:
      allowPrivilegeEscalation: false
      # readOnlyRootFilesystem: true # issue with verify jobs?
      capabilities: { drop: [ALL] }
      seccompProfile: { type: RuntimeDefault }
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: "${TZ}"
  server:
    auth:
      insecure:
        acknowledgeInsecure: true
    namespace: kopiur-system
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: b2
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      auth:
        secretRef:
          name: kopiur-b2-secret
      endpoint: s3.eu-central-003.backblazeb2.com
      region: eu-central-003
      bucket: kopia-7dc5
  encryption:
    passwordSecretRef:
      name: kopiur-b2-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  # Same scan-request-token livelock workaround as `garage`. Disabling
  # auto-adoption at the repo level until the upstream fix lands.
  catalog:
    adoption: Ignore
  maintenance:
    enabled: true
    schedule:
      full:
        cron: 0 3 * * 1
      quick:
        cron: 0 6 * * *
  moverDefaults:
    cache:
      capacity: 2Gi
      mode: Ephemeral
      storageClassName: zfs-spark
    podSecurityContext:
      fsGroup: 65532
      fsGroupChangePolicy: OnRootMismatch
    scratch:
      capacity: 1Gi
      storageClassName: zfs-spark
    securityContext:
      allowPrivilegeEscalation: false
      # readOnlyRootFilesystem: true # issue with verify jobs?
      capabilities: { drop: [ALL] }
      seccompProfile: { type: RuntimeDefault }
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: "${TZ}"
  server:
    auth:
      insecure:
        acknowledgeInsecure: true
    namespace: kopiur-system
