---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dawarich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        pod:
          securityContext:
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app: &bapp
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1@sha256:a884f69f19ce0f66992f3872d24544d1e587e133b8a003e072711aafc1e02429
            env:
              # RAILS_ENV: production
              RAILS_ENV: development
              TIME_ZONE: "${TZ}"
              REDIS_URL: redis://localhost:6379
              APPLICATION_HOSTS: "{{ .Release.Name }}.${SECRET_DOMAIN}"
              APPLICATION_PROTOCOL: http
              MIN_MINUTES_SPENT_IN_CITY: 60
              DISTANCE_UNIT: km
              ROMETHEUS_EXPORTER_ENABLED: false
              PROMETHEUS_EXPORTER_HOST: 0.0.0.0
              PROMETHEUS_EXPORTER_PORT: 9394
              ENABLE_TELEMETRY: false # More on telemetry: https://dawarich.app/docs/tutorials/telemetry
              SELF_HOSTED: "true"

              OIDC_CLIENT_ID: *app
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-secret
              OIDC_ISSUER: "https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}"
              OIDC_REDIRECT_URI: https://{{ .Release.Name }}.${SECRET_DOMAIN}/users/auth/openid_connect/callback
              OIDC_PROVIDER_NAME: Kanidm

              DATABASE_HOST: pooler-rw.postgres.svc.cluster.local
              DATABASE_NAME: *app
              DATABASE_USERNAME: *app

              PGSSLROOTCERT: /var/run/secrets/root-ca/ca.crt
              PGSSLCERT: /var/run/secrets/postgresql/tls.crt
              PGSSLKEY: /var/run/secrets/postgresql/tls.key
              PGSSLMODE: verify-full
            resources:
              requests:
                memory: "368Mi"
                cpu: "10m"
            command:
              - "web-entrypoint.sh"
            args:
              - "bin/rails server -p 3000 -b ::"
          sidekick:
            <<: *bapp
            command:
              - "sidekiq-entrypoint.sh"
            args:
              - "bundle exec sidekiq"
            resources:
              requests:
                memory: "327Mi"
                cpu: "10m"

    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: 3000

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: Dawarich
          gethomepage.dev/icon: google-maps.png
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80
