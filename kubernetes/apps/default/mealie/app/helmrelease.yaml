---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    controllers:
      *app :
        type: statefulset
        containers:
          app:
            env:
              TZ: ${TZ}
              HOST: "::"
              API_HOST: "*"
              BASE_URL: https://${APP}.${SECRET_DOMAIN}

              DB_ENGINE: postgres
              POSTGRES_URL_OVERRIDE:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url

              ALLOW_PASSWORD_LOGIN: "false"
              OIDC_AUTH_ENABLED: "true"
              OIDC_CONFIGURATION_URL: https://idm.${SECRET_DOMAIN}/oauth2/openid/${APP}/.well-known/openid-configuration
              OIDC_CLIENT_ID: *app
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-${APP}-oidc
                    key: client-secret
              OIDC_USER_GROUP: "users@idm.${SECRET_DOMAIN}"
              OIDC_ADMIN_GROUP: "admins@idm.${SECRET_DOMAIN}"
              OIDC_AUTO_REDIRECT: "true"
              OIDC_SCOPES_OVERRIDE: "openid profile email groups"

              OPENAI_BASE_URL: http://litellm.ai.svc.cluster.local
              OPENAI_MODEL: llama3.1:8b
              OPENAI_ENABLE_IMAGE_SERVICES: false

              LOG_CONFIG_OVERRIDE: /config/logconf.json
            envFrom:
              - secretRef:
                  name: *app
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.21.0@sha256:4e1e8d98b883009cb849851857e277109c21db1c2d857ae61e14de894f2169ff
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                spec:
                  httpGet:
                    port: &port 9000
                    path: /api/app/about
              readiness: *probe
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 500Mi

    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: network
          - name: internal
            namespace: network

    persistence:
      config:
        type: configMap
        name: mealie-configmap
        globalMounts:
          - path: /config/logconf.json
            subPath: logconf.json

      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
