---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app miniflux
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        strategy: RollingUpdate
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
          enableServiceLinks: false
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: ghcr.io/miniflux/miniflux
              tag: 2.3.2@sha256:cd353a6af9ce663291f405eddef26fa0d567f486b521c5d34e3fb50e41938b9a

            env:
              BASE_URL: "https://{{ .Release.Name }}.${MAIN_DOMAIN}"
              DATABASE_URL: postgresql://miniflux@pooler-rw-se.postgres.svc:5432/miniflux?sslmode=verify-full&sslcert=/var/run/secrets/postgresql/tls.crt&sslkey=/var/run/secrets/postgresql/tls.key&sslrootcert=/var/run/secrets/root-ca/ca.crt
                # valueFrom:
                #   secretKeyRef:
                #     name: "{{ .Release.Name }}-postgres"
                #     key: url

              # CREATE_ADMIN: "1"
              # DEBUG: "1"
              LOG_DATE_TIME: "1"
              POLLING_SCHEDULER: entry_frequency
              POLLING_FREQUENCY: "15"
              RUN_MIGRATIONS: "1"

              OAUTH2_PROVIDER: oidc
              OAUTH2_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-id
              OAUTH2_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-secret
              OAUTH2_REDIRECT_URL: https://{{ .Release.Name }}.${MAIN_DOMAIN}/oauth2/oidc/callback
              OAUTH2_OIDC_DISCOVERY_ENDPOINT: https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}
              OAUTH2_OIDC_PROVIDER_NAME: "Kanidm"

              OAUTH2_USER_CREATION: "1"
              DISABLE_LOCAL_AUTH: "1"

              # INTEGRATION_ALLOW_PRIVATE_NETWORKS: "true"
              LISTEN_ADDR: "[::]:8080"

            # envFrom:
            #   - secretRef:
            #       name: miniflux-secret

            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        annotations:
          dashboard.home/enabled: "true"
          dashboard.home/name: Miniflux
          dashboard.home/description: RSS Reader
          dashboard.home/icon: miniflux
          dashboard.home/group: Apps
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
