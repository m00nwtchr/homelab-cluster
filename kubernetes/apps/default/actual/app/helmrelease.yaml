---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app actual
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      actual:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 2000
            runAsUser: 2000

        containers:
          # actual-flow:
          #   image:
          #     repository: ghcr.io/actualbudget/actual
          #     tag: 26.3.0@sha256:eb8bc26f53025e07e464594c12d77c52c4b95840c8dadd9b95c4f0c4660f8ad2
          #   env:
          #     ACTUAL_PORT: &httpPort 5006
          #     ACTUAL_OPENID_DISCOVERY_URL: "https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}/.well-known/openid-configuration"
          #     ACTUAL_OPENID_CLIENT_ID: *app
          #     ACTUAL_OPENID_CLIENT_SECRET:
          #       valueFrom:
          #         secretKeyRef:
          #           name: "kanidm-{{ .Release.Name }}-oidc"
          #           key: client-secret
          #     ACTUAL_OPENID_SERVER_HOSTNAME: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
          #     ACTUAL_OPENID_ENFORCE: "false"
          #     ACTUAL_TOKEN_EXPIRATION: "openid-provider"
          #     ACTUAL_USER_CREATION_MODE: "login"
          app:
            image:
              repository: ghcr.io/actualbudget/actual
              tag: 26.3.0@sha256:eb8bc26f53025e07e464594c12d77c52c4b95840c8dadd9b95c4f0c4660f8ad2
            env:
              ACTUAL_PORT: &httpPort 5006
              # ACTUAL_OPENID_DISCOVERY_URL: "https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}/.well-known/openid-configuration"
              # ACTUAL_OPENID_CLIENT_ID: *app
              # ACTUAL_OPENID_CLIENT_SECRET:
              #   valueFrom:
              #     secretKeyRef:
              #       name: "kanidm-{{ .Release.Name }}-oidc"
              #       key: client-secret
              # ACTUAL_OPENID_SERVER_HOSTNAME: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              # ACTUAL_OPENID_ENFORCE: "false"
              # ACTUAL_TOKEN_EXPIRATION: "openid-provider"
              # ACTUAL_USER_CREATION_MODE: "login"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 20m
                memory: 100Mi
              limits:
                memory: 100Mi

    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *httpPort

    persistence:
      data:
        existingClaim: *app

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
