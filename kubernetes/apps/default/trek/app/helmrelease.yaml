---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trek
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      *app :
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }

        containers:
          app:
            image:
              repository: mirror.gcr.io/mauriceboe/trek
              tag: 3.4.1@sha256:ce7fab639b89a6f62d484d1175a7d489a536a8c77291f56c03fec20608d4a3eb
            args:
              - /bin/sh
              - -c
              - cd /app/server && exec node --require tsconfig-paths/register dist/index.js
            env:
              APP_URL: https://{{ .Release.Name }}.${MAIN_DOMAIN}
              ALLOWED_ORIGINS: https://{{ .Release.Name }}.${MAIN_DOMAIN}
              ALLOW_INTERNAL_NETWORK: true
              TRUST_PROXY: true
              FORCE_HTTPS: true
              TZ: "${TZ}"

              ENCRYPTION_KEY:
                secretKeyRef:
                  name: *app
                  key: ENCRYPTION_KEY

              OIDC_ONLY: true
              OIDC_ADMIN_CLAIM: groups
              OIDC_ADMIN_VALUE: admins@idm.${SECRET_DOMAIN}
              OIDC_SCOPE: openid email profile groups
              OIDC_DISPLAY_NAME: Kanidm
              OIDC_ISSUER: "https://idm.${SECRET_DOMAIN}/oauth2/openid/${APP}"
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-id
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-secret

              # SMTP_HOST: smtp-relay.cluster-infra
              # SMTP_PORT: 25
              # SMTP_FROM: TREK <trek@${MAIN_DOMAIN}>
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 1Gi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: { type: RuntimeDefault }
              capabilities: { drop: ["ALL"] }

    service:
      main:
        ports:
          http:
            port: *port

    route:
      main:
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: tunnel
            namespace: network
          - name: internal
            namespace: network

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/uploads
            subPath: uploads
