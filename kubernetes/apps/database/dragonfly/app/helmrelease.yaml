---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dfguard
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
    controllers:
      *app :
        containers:
          app:
            image:
              repository: ghcr.io/m00nwtchr/dfguard
              tag: 0.2.1@sha256:184edcaa827260fa9ad354f9c5d618902d4e43ee834d4b1ed2c91aa4dfe5091f
            args:
              - --listen
              - "[::]:6379"
              - --upstream
              - dragonfly.database.svc:6379
              - --acl
              - /config/acl.conf
              - --server-cert
              - /tls/server/tls.crt
              - --server-key
              - /tls/server/tls.key
              - --server-ca
              - /tls/client/ca.crt
              - --upstream-cert
              - /tls/dragonfly/tls.crt
              - --upstream-key
              - /tls/dragonfly/tls.key
              - --upstream-ca
              - /tls/ca/ca.crt
            probes:
              liveness:
                enabled: true
                type: TCP
                port: &port 6379
              readiness:
                enabled: true
                type: TCP
                port: *port
            resources:
              requests:
                cpu: 249m
                memory: 160Mi
              limits:
                cpu: 200m
                memory: 160Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: *app
        ports:
          redis:
            port: *port

    persistence:
      acl:
        type: secret
        name: dragonfly-acls
        globalMounts:
          - path: /config
            readOnly: true

      tls:
        type: secret
        name: dfguard-server-cert
        globalMounts:
          - path: /tls/server
            readOnly: true
      client-ca:
        type: secret
        name: dfguard-client-ca
        globalMounts:
          - path: /tls/client
            readOnly: true

      dragonfly-cert:
        type: secret
        name: dfguard-client-cert
        globalMounts:
          - path: /tls/dragonfly
            readOnly: true

      root-ca:
        type: configMap
        name: root-ca
        globalMounts:
          - path: /tls/ca
            readOnly: true
