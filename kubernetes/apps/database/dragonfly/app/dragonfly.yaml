---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  replicas: 1
  image: ghcr.io/dragonflydb/dragonfly:v1.37.0@sha256:84b1009aee0b68327758bce8e99ed514f782d713353acc46caf5738feaa481d6
  args:
    - "--bind=::"
    - "--admin_bind=::"
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --lock_on_hashtags
    - --default_lua_flags=allow-undeclared-keys

  labels:
    role: master # Bug when replicas=1

  aclFromSecret:
    key: acl.conf
    name: dragonfly-acls

  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi

  resources:
    requests:
      cpu: 100m
    limits:
      memory: 512Mi

  # authentication:
  #   clientCaCertSecret:
  #     name: dragonfly-client-ca
  #     key: ca.crt

  # tlsSecretRef:
  #   name: dragonfly-server-cert
