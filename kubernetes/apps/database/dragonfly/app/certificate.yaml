---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: &name dragonfly-server-cert
spec:
  dnsNames:
    - dragonfly.database.svc
    - dragonfly.database.svc.cluster.local
  subject:
    countries:
      - PL
    organizations:
      - homelab-cluster
  usages:
    - server auth
  duration: 720h # 1 month
  privateKey:
    algorithm: ECDSA
    size: 384
    encoding: PKCS8
    rotationPolicy: Always
  issuerRef:
    name: database-server-ca
    kind: Issuer
    group: cert-manager.io
  secretName: *name
