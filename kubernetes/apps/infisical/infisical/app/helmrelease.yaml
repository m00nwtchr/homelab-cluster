# ---
# # yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
# apiVersion: source.toolkit.fluxcd.io/v1
# kind: HelmRepository
# metadata:
#   name: infisical
# spec:
#   interval: 1h
#   url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infisical
spec:
  interval: 5m
  url: https://github.com/Infisical/infisical.git
  ref:
    tag: v0.159.8
  ignore: |-
    # exclude all
    /*
    # include charts directory
    !/helm-charts/infisical-standalone-postgres
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app infisical
spec:
  interval: 1h
  chart:
    #   spec:
    #     chart: *app
    #     version: 0.4.2
    #     sourceRef:
    #       kind: HelmRepository
    #       name: *app
    spec:
      chart: helm-charts/infisical-standalone-postgres
      sourceRef:
        kind: GitRepository
        name: *app
  values:
    infisical:
      fullnameOverride: *app

      image:
        repository: infisical/infisical
        tag: "v0.159.8@sha256:84d8788880ba3ac3da7320819e78f12ca690dbdeee52b866150e71330e83e010"
        pullPolicy: IfNotPresent
      replicaCount: 2

      extraEnv:
        - name: HOST
          value: "::"
        - name: DB_CONNECTION_URI
          valueFrom:
            secretKeyRef:
              name: "infisical-postgres"
              key: url
        - name: REDIS_URL
          value: redis://localhost:6379
        - name: SITE_URL
          value: "https://infisical.${SECRET_DOMAIN}"
        - name: ALLOW_INTERNAL_IP_CONNECTIONS
          value: "true"

    postgresql:
      enabled: false
    redis:
      enabled: false
    ingress:
      enabled: false
      nginx:
        enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  runAsUser: 65532
                  runAsGroup: 65532
                  fsGroup: 65532
                  fsGroupChangePolicy: OnRootMismatch
                  seccompProfile:
                    type: RuntimeDefault

              - op: add
                path: /spec/template/spec/containers/0/securityContext
                value:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault

              - op: add
                path: /spec/template/spec/volumes
                value:
                  - name: tmp-dir
                    emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts
                value:
                  - name: tmp-dir
                    mountPath: /tmp
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    containers:
                      - name: infisical-standalone-infisical
                        volumeMounts:
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                          - name: postgres-certs
                            mountPath: /var/run/secrets/postgresql
                            readOnly: true
                    volumes:
                      - name: root-ca
                        configMap:
                          name: root-ca
                          defaultMode: 0440
                      - name: postgres-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: postgres-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/common-name: ${APP}
                            csi.cert-manager.io/dns-names: $${POD_NAME}.$${POD_NAMESPACE}.svc.cluster.local
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    volumes:
                      - name: dragonfly-stunnel
                        configMap:
                          name: dragonfly-stunnel
                      - name: dragonfly-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: dfguard-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/dns-names: ${APP}

                    initContainers:
                      - name: dragonfly-stunnel
                        image: cgr.dev/chainguard/stunnel:latest@sha256:bd75c58ee97c9139081a177509734b2aa1beaead0afe784d9d74741eb5a44451
                        restartPolicy: Always
                        args:
                          - /etc/stunnel/stunnel.conf
                        volumeMounts:
                          - name: dragonfly-stunnel
                            mountPath: /etc/stunnel/stunnel.conf
                            subPath: stunnel.conf
                            readOnly: true
                          - name: dragonfly-certs
                            mountPath: /var/run/secrets/dragonfly
                            readOnly: true
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
