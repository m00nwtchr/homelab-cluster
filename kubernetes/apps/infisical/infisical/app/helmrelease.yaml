# ---
# # yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
# apiVersion: source.toolkit.fluxcd.io/v1
# kind: HelmRepository
# metadata:
#   name: infisical
# spec:
#   interval: 1h
#   url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: infisical
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.162.13
  url: oci://ghcr.io/home-operations/charts-mirror/infisical-standalone-postgres
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/home-operations/charts-mirror.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app infisical
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  # chart:
  #   spec:
  #     chart: *app
  #     version: 0.4.2
  #     sourceRef:
  #       kind: HelmRepository
  #       name: *app
  values:
    infisical:
      fullnameOverride: *app

      image:
        repository: infisical/infisical
        tag: "v0.162.12@sha256:ddaa5ef10fd465d597a7d0069d991db9269312a9d0965f4befa8ec4217603a30"
        pullPolicy: IfNotPresent
      replicaCount: 2

      extraEnv:
        - name: HOST
          value: "::"
        - name: DB_CONNECTION_URI
          valueFrom:
            secretKeyRef:
              name: "infisical-postgres"
              key: url
        - name: REDIS_URL
          value: redis://localhost:6379
        - name: SITE_URL
          value: "https://infisical.${SECRET_DOMAIN}"
        - name: ALLOW_INTERNAL_IP_CONNECTIONS
          value: "true"

    postgresql:
      enabled: false
    redis:
      enabled: false
    ingress:
      enabled: false
      nginx:
        enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |
              - op: add
                path: /spec/template/spec/securityContext
                value:
                  runAsNonRoot: true
                  runAsUser: 1001
                  runAsGroup: 1001
                  fsGroup: 1001
                  fsGroupChangePolicy: OnRootMismatch
                  seccompProfile:
                    type: RuntimeDefault

              - op: add
                path: /spec/template/spec/containers/0/securityContext
                value:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault

              - op: add
                path: /spec/template/spec/volumes
                value:
                  - name: tmp-dir
                    emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts
                value:
                  - name: tmp-dir
                    mountPath: /tmp
                    subPath: tmp
                  - name: tmp-dir
                    mountPath: /etc/ssl/certs
                    subPath: ssl
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    containers:
                      - name: infisical-standalone-postgres-infisical
                        volumeMounts:
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                          - name: postgres-certs
                            mountPath: /var/run/secrets/postgresql
                            readOnly: true
                    volumes:
                      - name: root-ca
                        configMap:
                          name: root-ca
                          defaultMode: 0440
                      - name: postgres-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: postgres-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/common-name: ${APP}
                            csi.cert-manager.io/dns-names: $${POD_NAME}.$${POD_NAMESPACE}.svc.cluster.local
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    volumes:
                      - name: dragonfly-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: dfguard-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/dns-names: ${APP}

                    initContainers:
                      - name: dragonfly-tunnel
                        restartPolicy: Always
                        image: ghcr.io/m00nwtchr/dfguard:rolling
                        args: ["tunnel"]
                        env:
                          - name: DFGUARD_TUNNEL_CERT
                            value: /var/run/secrets/dragonfly/tls.crt
                          - name: DFGUARD_TUNNEL_KEY
                            value: /var/run/secrets/dragonfly/tls.key
                          - name: DFGUARD_TUNNEL_CA
                            value: /var/run/secrets/root-ca/ca.crt
                          - name: DFGUARD_TUNNEL_UPSTREAM
                            value: dfguard.database.svc.cluster.local.:6379
                          - name: DFGUARD_TUNNEL_TCP_NODELAY
                            value: "true"
                        volumeMounts:
                          - name: dragonfly-certs
                            mountPath: /var/run/secrets/dragonfly
                            readOnly: true
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
