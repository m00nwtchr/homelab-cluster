---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/admissionregistration.k8s.io/mutatingadmissionpolicybinding_v1alpha1.json
apiVersion: admissionregistration.k8s.io/v1alpha1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: renovate-job-stunnel
spec:
  policyName: renovate-job-stunnel
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/admissionregistration.k8s.io/mutatingadmissionpolicy_v1alpha1.json
apiVersion: admissionregistration.k8s.io/v1alpha1
kind: MutatingAdmissionPolicy
metadata:
  name: renovate-job-stunnel
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["jobs"]
  matchConditions:
    - name: has-renovate-job-generate-name-prefix
      expression: >
        has(object.metadata.generateName) &&
        object.metadata.generateName.startsWith("renovate-")
    - name: has-renovate-labels
      expression: >
        has(object.metadata.labels) &&
        object.metadata.labels["renovate-operator.mogenius.com/job-type"] == "executor"
    - name: missing-dragonfly-stunnel-container
      expression: >
        !has(object.spec.template.spec.containers) ||
        !object.spec.template.spec.containers.exists(c, c.name == "dragonfly-stunnel")
    - name: has-volumes-array
      expression: >
        has(object.spec.template.spec.volumes)
    - name: has-containers-array
      expression: >
        has(object.spec.template.spec.containers)
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >
          [
            JSONPatch{
              op: "add",
              path: "/spec/template/spec/containers/-",
              value: Object.spec.template.spec.containers{
                name: "dragonfly-stunnel",
                image: "cgr.dev/chainguard/stunnel:latest@sha256:4bf8b6706b389405be4b4f9a8bdafe7cc7150ab136ec70151c2933ceb0229b2d",
                args: ["/etc/stunnel/stunnel.conf"],
                volumeMounts: [
                  Object.spec.template.spec.containers.volumeMounts{
                    name: "dragonfly-stunnel",
                    mountPath: "/etc/stunnel/stunnel.conf",
                    subPath: "stunnel.conf",
                    readOnly: true
                  },
                  Object.spec.template.spec.containers.volumeMounts{
                    name: "dragonfly-certs",
                    mountPath: "/var/run/secrets/dragonfly",
                    readOnly: true
                  },
                  Object.spec.template.spec.containers.volumeMounts{
                    name: "root-ca",
                    mountPath: "/var/run/secrets/root-ca",
                    readOnly: true
                  }
                ],
                securityContext: Object.spec.template.spec.containers.securityContext{
                  allowPrivilegeEscalation: false,
                  readOnlyRootFilesystem: true,
                  capabilities: Object.spec.template.spec.containers.securityContext.capabilities{
                    drop: ["ALL"]
                  },
                  seccompProfile: Object.spec.template.spec.containers.securityContext.seccompProfile{
                    type: "RuntimeDefault"
                  }
                }
              }
            }
          ]
