---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/admissionregistration.k8s.io/mutatingadmissionpolicybinding_v1beta1.json
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: renovate-job-stunnel
spec:
  policyName: renovate-job-stunnel
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/admissionregistration.k8s.io/mutatingadmissionpolicy_v1beta1.json
apiVersion: admissionregistration.k8s.io/v1beta1
kind: MutatingAdmissionPolicy
metadata:
  name: renovate-job-stunnel
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["jobs"]
  matchConditions:
    - name: has-renovate-job-generate-name-prefix
      expression: >
        has(object.metadata.generateName) &&
        object.metadata.generateName.startsWith("renovate-")
    # - name: has-renovate-labels
    #   expression: >
    #     has(object.metadata.labels) &&
    #     object.metadata.labels["renovate-operator.mogenius.com/job-type"] == "executor"
    - name: missing-dragonfly-tunnel-container
      expression: >
        !has(object.spec.template.spec.initContainers) ||
        !object.spec.template.spec.initContainers.exists(c, c.name == "dragonfly-tunnel")
    - name: has-volumes-array
      expression: >
        has(object.spec.template.spec.volumes)
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >
          (
            !has(object.spec.template.spec.initContainers)
            ? [
                JSONPatch{
                  op: "add",
                  path: "/spec/template/spec/initContainers",
                  value: []
                }
              ]
            : []
          ) +
          [
            JSONPatch{
              op: "add",
              path: "/spec/template/spec/initContainers/-",
              value: Object.spec.template.spec.initContainers{
                name: "dragonfly-tunnel",
                image: "ghcr.io/m00nwtchr/dfguard:rolling",
                restartPolicy: "Always",
                args: ["tunnel"],
                env: [
                  Object.spec.template.spec.initContainers.env{
                    name: "DFGUARD_TUNNEL_CERT",
                    value: "/var/run/secrets/dragonfly/tls.crt"
                  },
                  Object.spec.template.spec.initContainers.env{
                    name: "DFGUARD_TUNNEL_KEY",
                    value: "/var/run/secrets/dragonfly/tls.key"
                  },
                  Object.spec.template.spec.initContainers.env{
                    name: "DFGUARD_TUNNEL_CA",
                    value: "/var/run/secrets/root-ca/ca.crt"
                  },
                  Object.spec.template.spec.initContainers.env{
                    name: "DFGUARD_TUNNEL_UPSTREAM",
                    value: "dfguard.database.svc.cluster.local.:6379"
                  },
                  Object.spec.template.spec.initContainers.env{
                    name: "DFGUARD_TUNNEL_TCP_NODELAY",
                    value: "true"
                  }
                ],
                volumeMounts: [
                  Object.spec.template.spec.initContainers.volumeMounts{
                    name: "dragonfly-certs",
                    mountPath: "/var/run/secrets/dragonfly",
                    readOnly: true
                  },
                  Object.spec.template.spec.initContainers.volumeMounts{
                    name: "root-ca",
                    mountPath: "/var/run/secrets/root-ca",
                    readOnly: true
                  }
                ],
                securityContext: Object.spec.template.spec.initContainers.securityContext{
                  allowPrivilegeEscalation: false,
                  readOnlyRootFilesystem: true,
                  capabilities: Object.spec.template.spec.initContainers.securityContext.capabilities{
                    drop: ["ALL"]
                  },
                  seccompProfile: Object.spec.template.spec.initContainers.securityContext.seccompProfile{
                    type: "RuntimeDefault"
                  }
                }
              }
            }
          ]
