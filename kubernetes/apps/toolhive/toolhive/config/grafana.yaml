---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: &name grafana
spec:
  image: docker.io/grafana/mcp-grafana:0.17.1-alpine@sha256:bc965f822b5d6ffd5e1a331b100c5bee0a0a28eeef22908af486f12b2ed474b2
  args: ["-t", "stdio"]
  transport: stdio
  groupRef: mcp-tools
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.observability.svc.cluster.local:3000
  secrets:
    - name: grafana-mcp
      key: token
      targetEnvName: GRAFANA_SERVICE_ACCOUNT_TOKEN
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          # krr: controller=grafana container=mcp
          resources:
            limits:
              cpu: "500m"
            requests:
              cpu: "10m"
  # krr: controller=grafana container=toolhive
  resources:
    limits:
      cpu: 200m
      memory: 100Mi
    requests:
      cpu: 10m
      memory: 100Mi
