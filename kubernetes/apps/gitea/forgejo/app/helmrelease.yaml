---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: forgejo
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 16.2.2
  url: oci://code.forgejo.org/forgejo-helm/forgejo
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    httpRoute:
      enabled: false
      hostnames: ["git.${SECRET_DOMAIN}"]
      parentRefs:
        - name: external
          namespace: network
        - name: internal
          namespace: network
      backendRefs:
        - name: forgejo-anubis
          port: 80
      matches:
        timeouts:
          request: 300s

    tcpRoute:
      enabled: true
      parentRefs:
        - kind: ListenerSet
          name: external
          sectionName: ssh
        - kind: ListenerSet
          name: internal
          sectionName: ssh

    # https://codeberg.org/forgejo/-/packages/container/forgejo/14.0.2
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 14.0.5-rootless
      digest: sha256:5552c9e25f353760420b8ac7a7f0f0a788ff571bbfd8e2c1e93503d3e2e1b87a

    # initPreScript: |
    #   curl -L -o libinfisical-pkcs11.tar.gz \
    #     https://github.com/Infisical/infisical-pkcs-11/releases/latest/download/libinfisical-pkcs11-linux-amd64.so.tar.gz
    #   tar -xzf libinfisical-pkcs11.tar.gz

    gitea:
      admin:
        username: ""
      #    existingSecret: forgejo-admin-secret
      #    email: "m00n@example.com"

      oauth:
        - name: kanidm
          provider: openidConnect
          existingSecret: kanidm-forgejo-oidc
          autoDiscoverUrl: "https://idm.${SECRET_DOMAIN}/oauth2/openid/forgejo/.well-known/openid-configuration"

      config:
        database:
          DB_TYPE: postgres

          HOST: pooler-rw.postgres.svc:5432
          USER: forgejo
          NAME: forgejo
          SSL_MODE: verify-full

        server:
          APP_DATA_PATH: /data/gitea
          ROOT_URL: https://git.${SECRET_DOMAIN}
          START_SSH_SERVER: true
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
        lfs:
          PATH: /data/git/lfs
        repository:
          ROOT: /data/git/repositories
        repository.signing:
          # FORMAT: gpg
          SIGNING_KEY: 229FDC3E12F74498B8197FEF84708C69967C22BF
          SIGNING_NAME: "Forgejo"
          SIGNING_EMAIL: "forgejo@${MAIN_DOMAIN}"

          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey, basesigned, commitssigned
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          ENABLE_INTERNAL_SIGNIN: true
          SHOW_REGISTRATION_BUTTON: false
          ENABLE_PASSWORD_SIGNIN_FORM: true
          ENABLE_NOTIFY_MAIL: true
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        queue:
          TYPE: redis
          CONN_STR: redis://localhost:6379?pool_size=100&idle_timeout=180s
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://localhost:6379?pool_size=100&idle_timeout=180s
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://localhost:6379?pool_size=100&idle_timeout=180s
        actions:
          ENABLED: true
        mailer:
          ENABLED: true
          FROM: Forgejo <forgejo@${SECRET_DOMAIN}>
          PROTOCOL: smtps
          SMTP_ADDR: smtp.migadu.com
          SMTP_PORT: 465
          USER: forgejo@${SECRET_DOMAIN}

      # additionalConfigSources:
      #   - secret:
      #       secretName: forgejo-secret

      additionalConfigFromEnvs:
        - name: FORGEJO__MAILER__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-migadu
              key: password

    deployment:
      env:
        - name: GNUPGHOME
          value: /data/gitea/git/.gnupg
        - name: PGSSLROOTCERT
          value: /var/run/secrets/root-ca/ca.crt
        - name: PGSSLCERT
          value: /var/run/secrets/postgresql/tls.crt
        - name: PGSSLKEY
          value: /var/run/secrets/postgresql/tls.key
        - name: INFISICAL_SERVER_URL
          value: https://infisical.${SECRET_DOMAIN}

    service:
      ssh:
        clusterIP: 2001:cafe:43::ef37

    valkey-cluster:
      enabled: false
    postgresql-ha:
      enabled: false

    persistence:
      create: false
      claimName: ${APP}

    extraVolumes:
      - name: pkcs
        emptyDir: {}

      - name: git
        persistentVolumeClaim:
          claimName: git

      - name: postgres-forgejo
        csi:
          driver: csi.cert-manager.io
          readOnly: true
          volumeAttributes:
            csi.cert-manager.io/issuer-name: postgres-client-ca
            csi.cert-manager.io/issuer-kind: ClusterIssuer
            csi.cert-manager.io/key-algorithm: ECDSA
            csi.cert-manager.io/key-size: "384"
            csi.cert-manager.io/key-encoding: PKCS8
            csi.cert-manager.io/key-usages: client auth
            csi.cert-manager.io/common-name: forgejo
            csi.cert-manager.io/dns-names: $${POD_NAME}.$${POD_NAMESPACE}.svc.cluster.local

      - name: root-ca
        configMap:
          defaultMode: 0600
          name: root-ca

      - name: forgejo-ssh
        secret:
          secretName: forgejo-ssh

    extraInitVolumeMounts:
      - name: postgres-forgejo
        mountPath: "/var/run/secrets/postgresql"
      - name: root-ca
        mountPath: "/var/run/secrets/root-ca"

    extraContainerVolumeMounts:
      - name: git
        mountPath: "/data/git/"

      - name: postgres-forgejo
        mountPath: "/var/run/secrets/postgresql"
      - name: root-ca
        mountPath: "/var/run/secrets/root-ca"

      - name: forgejo-ssh
        mountPath: "/data/gitea/ssh/ssh_host_ed25519_key"
        subPath: ssh_host_ed25519_key
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: *app
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/envFrom
                value:
                  - secretRef:
                      name: forgejo-secret
          - target:
              version: v1
              kind: Deployment
              name: *app
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    containers:
                      - name: forgejo
                        env:
                          - name: SCD_SOCKET_DIR
                            value: /var/run/gnupg-pkcs11-scd
                          - name: SCD_SOCKET_NAME
                            value: agent.S
                        volumeMounts:
                          - name: scd
                            mountPath: /var/run/gnupg-pkcs11-scd
                          - name: scdaemon-shim
                            mountPath: /opt/scdaemon-shim/
                          - name: gnupg-config
                            mountPath: /data/gitea/git/.gnupg/gpg-agent.conf
                            subPath: gpg-agent.conf
                            readOnly: true
                    initContainers:
                      - name: gnupg-pkcs11-scd
                        restartPolicy: Always
                        image: ghcr.io/m00nwtchr/gnupg-pkcs11-scd:rolling
                        imagePullPolicy: IfNotPresent
                        envFrom:
                          - secretRef:
                              name: forgejo-secret
                        volumeMounts:
                          - name: scd
                            mountPath: /var/run/gnupg-pkcs11-scd
                          - name: infisical-pkcs11
                            mountPath: /providers/infisical
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                    volumes:
                      - name: scd
                        emptyDir: {}
                      - name: scdaemon-shim
                        image:
                          reference: ghcr.io/m00nwtchr/scdaemon-shim:rolling
                          pullPolicy: IfNotPresent
                      - name: infisical-pkcs11
                        image:
                          reference: ghcr.io/m00nwtchr/infisical-pkcs11-provider:0.0.3
                          pullPolicy: IfNotPresent
                      - name: gnupg-config
                        configMap:
                          name: gnupg-forgejo-config
                          defaultMode: 384
          - target:
              version: v1
              kind: Deployment
              name: *app
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    volumes:
                      - name: dragonfly-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: dfguard-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/dns-names: forgejo
                      - name: root-ca
                        configMap:
                          name: root-ca
                          defaultMode: 0440

                    initContainers:
                      - name: dragonfly-tunnel
                        restartPolicy: Always
                        image: ghcr.io/m00nwtchr/dfguard:rolling
                        args: ["tunnel"]
                        env:
                          - name: DFGUARD_TUNNEL_CERT
                            value: /var/run/secrets/dragonfly/tls.crt
                          - name: DFGUARD_TUNNEL_KEY
                            value: /var/run/secrets/dragonfly/tls.key
                          - name: DFGUARD_TUNNEL_CA
                            value: /var/run/secrets/root-ca/ca.crt
                          - name: DFGUARD_TUNNEL_UPSTREAM
                            value: dfguard.database.svc.cluster.local.:6379
                          - name: DFGUARD_TUNNEL_TCP_NODELAY
                            value: "true"
                        volumeMounts:
                          - name: dragonfly-certs
                            mountPath: /var/run/secrets/dragonfly
                            readOnly: true
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
