---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app towonel-agent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

    controllers:
      *app :
        type: deployment
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: codeberg.org/towonel/towonel-agent
              tag: 1.2.0@sha256:fac637f00207b237ce92a6a3a36000f4703872d84a1ce0bb39c8322cb3445f4b
            env:
              RUST_LOG: info
              TOWONEL_AGENT_SERVICES: |
                [
                  {"hostname":"${MAIN_DOMAIN}","origin":"tunnel.network.svc.cluster.local.:443"},
                  {"hostname":"${SECRET_DOMAIN}","origin":"tunnel.network.svc.cluster.local.:443"},
                  {"hostname":"*.${MAIN_DOMAIN}","origin":"tunnel.network.svc.cluster.local.:443"},
                  {"hostname":"*.${SECRET_DOMAIN}","origin":"tunnel.network.svc.cluster.local.:443"},
                  {"hostname":"voltkonekt.pl","origin":"tunnel.network.svc.cluster.local.:443" }
                ]
              TOWONEL_AGENT_TCP_SERVICES: |
                [
                  {"name":"turn-tcp","origin":"stunner.network.svc.cluster.local.:5349","listen_port":5349}
                ]
              TOWONEL_AGENT_UDP_SERVICES: |
                [
                  {"name":"turn-udp","origin":"stunner.network.svc.cluster.local.:3478","listen_port":3478}
                ]
              TOWONEL_INVITE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: TOWONEL_INVITE_TOKEN
              TOWONEL_AGENT_HEALTH_LISTEN_ADDR: "[::]:9090"
              NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 3
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 2
                  periodSeconds: 2
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 64Mi
    service:
      app:
        ports:
          http:
            port: 9090
    serviceMonitor:
      app:
        endpoints:
          - port: http
            interval: 1m
