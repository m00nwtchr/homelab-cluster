---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: fingerjoin
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.1.0
  url: oci://ghcr.io/m00nwtchr/charts/fingerjoin
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/m00nwtchr/fingerjoin.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app fingerjoin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    route:
      main:
        parentRefs:
          - name: cftunnel
            namespace: network
        hostnames:
          - ${SECRET_DOMAIN}
          - ${MAIN_DOMAIN}
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/webfinger
