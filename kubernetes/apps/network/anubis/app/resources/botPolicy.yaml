bots:
  - import: (data)/meta/default-config.yaml
  - name: allow-anubis
    action: ALLOW
    headers_regex:
      Host: ^anubis.${SECRET_DOMAIN}$
  - name: asd
    action: CHALLENGE
    path_regex: ^.*

openGraph:
  enabled: false
  considerHost: true
  ttl: 24h

status_codes:
  CHALLENGE: 200
  DENY: 403
