---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stunner
  annotations:
    external-dns.alpha.kubernetes.io/target: "turn.${SECRET_DOMAIN}"
    stunner.l7mp.io/enable-mixed-protocol-lb: "true"
    stunner.l7mp.io/external-traffic-policy: local
spec:
  gatewayClassName: stunner
  infrastructure:
    annotations:
      lbipam.cilium.io/sharing-key: external
      external-dns.alpha.kubernetes.io/hostname: "turn.${SECRET_DOMAIN}"
  listeners:
    - name: udp
      port: 3478
      protocol: TURN-UDP
      allowedRoutes:
        namespaces:
          from: All
    - name: tls
      port: 5349
      protocol: TURN-TLS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${APP}-tls
