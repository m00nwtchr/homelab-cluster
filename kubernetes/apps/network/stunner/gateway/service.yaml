---
apiVersion: v1
kind: Service
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
    external-dns.alpha.kubernetes.io/hostname: turn.${SECRET_DOMAIN}
    lbipam.cilium.io/ips: 192.168.0.192
    lbipam.cilium.io/sharing-key: internal
  labels:
    stunner.l7mp.io/owned-by: stunner
    stunner.l7mp.io/related-gateway-name: stunner
    stunner.l7mp.io/related-gateway-namespace: network
  name: stunner-lb-internal
spec:
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ipFamilies: [IPv4]
  ports:
    - name: udp
      port: 3478
      protocol: UDP
      targetPort: 3478
    - name: tls
      port: 5349
      protocol: TCP
      targetPort: 5349
  selector:
    app: stunner
    stunner.l7mp.io/related-gateway-name: stunner
    stunner.l7mp.io/related-gateway-namespace: network
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  type: LoadBalancer
