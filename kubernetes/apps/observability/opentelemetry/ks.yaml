---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: opentelemetry-operator
spec:
  components: []
  interval: 1h
  path: ./kubernetes/apps/observability/opentelemetry/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opentelemetry-collector
spec:
  dependsOn:
    - name: opentelemetry-operator
    - name: openebs
      namespace: openebs-system
  components:
    # - ../../../../components/oidc
    - ../../../../components/gatus/guarded
  interval: 1h
  path: ./kubernetes/apps/observability/opentelemetry/instance
  postBuild:
    substitute:
      APP: grafana
      NAMESPACE: &namespace observability
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: false
