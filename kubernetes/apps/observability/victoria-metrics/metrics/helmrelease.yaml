---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vm-k8s-stack
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.87.0
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/VictoriaMetrics/helm-charts.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vmks
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: vm-k8s-stack
  dependsOn:
    - name: victoria-metrics-operator
  values:
    global:
      cluster:
        # -- K8s cluster domain suffix, uses for building storage pods' FQDN. Details are [here](https://kubernetes.io/docs/tasks/administer-cluster/dns-custom-nameservers/)
        dnsDomain: cluster.local.
    nameOverride: *app

    crds:
      enabled: false

    victoria-metrics-operator:
      enabled: false

    defaultDashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: null
              grafana.internal/instance: grafana

    defaultDatasources:
      grafanaOperator:
        # -- Create datasources as CRDs (requires grafana-operator to be installed)
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: null
              grafana.internal/instance: grafana

    defaultRules:
      create: true

    alertmanager:
      enabled: true
      route:
        enabled: true
        parentRefs:
          - name: internal
            namespace: network
        hostnames: ["alertmanager.${SECRET_DOMAIN}"]
      spec:
        configReloaderExtraArgs:
          enableTCP6: "true"
        externalURL: https://alertmanager.${SECRET_DOMAIN}
        disableNamespaceMatcher: true

    vmalert:
      enabled: true
      spec:
        extraArgs:
          enableTCP6: "true"
        configReloaderExtraArgs:
          enableTCP6: "true"

    grafana:
      enabled: false

    vmsingle:
      spec:
        extraArgs:
          enableTCP6: "true"
          maxLabelsPerTimeseries: "40"
          search.maxUniqueTimeseries: "600000"
          search.minStalenessInterval: 5m
          opentelemetry.usePrometheusNaming: "true"
        replicaCount: 1
        retentionPeriod: 6w
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 60Gi
        useDefaultResources: false
        useStrictSecurity: true
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 500m

    vmagent:
      spec:
        globalScrapeMetricRelabelConfigs: &relabel-config
          - action: labeldrop
            regex: ((?:extensions_talos|feature_node).*)
        inlineRelabelConfig: *relabel-config
        extraArgs:
          enableTCP6: "true"
        configReloaderExtraArgs:
          enableTCP6: "true"
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 150m
        selectAllByDefault: true
        scrapeInterval: 20s

    prometheus-node-exporter:
      enabled: false

    kube-state-metrics:
      enabled: true
      fullnameOverride: kube-state-metrics

    kubelet:
      vmScrapes:
        kubelet:
          enabled: true
      vmScrape:
        spec:
          relabelConfigs:
            # This is the same as the chart default, but it explicitly excludes NFD node labels,
            # and talos extension labels, and some others. These don't really provide any value,
            # and they cause cardinality to explode.
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - action: labeldrop
              regex: (feature_node|extensions_talos_dev|beta_kubernetes|plan_upgrade_cattle_io|openebs_io|katacontainers_io|topology_rook_io_).*
            - action: labeldrop
              regex: .*kubevirt_io.*
            - action: labeldrop
              regex: .*home_arpa.*
            - sourceLabels: [__metrics_path__]
              targetLabel: metrics_path
            - targetLabel: job
              replacement: kubelet

    kubeApiServer:
      enabled: true

    kubeControllerManager:
      enabled: true
      service:
        selector:
          k8s-app: cilium
          component: ~
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeEtcd:
      service:
        selector:
          # This is a workaround for targeting etcd instance on all control planes.
          # Because etcd does not run in a pod, it cannot be directly targeted via a service.
          # Instead, the service must select pods that run on the same nodes as the etcd instances,
          # and also have host networking enabled. The controller manager and scheduler are good
          # choices because they meet these requirements.
          k8s-app: cilium
          component: ~
        # This port does not require authentication, and only serves metrics. TODO build automation
        # to pull in the etcd certs via talosctl, which can be called via pods with a Talos service account.
        # Then the normal, authenticated 2379 port can be used. Or even better, move the root CA out
        # of the cluster (probably into a HSM), and issue these certs with it.
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - port: http-metrics
              scheme: http

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false

    coreDns:
      enabled: false

    extraRules:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: Kubernetes cluster Dockerhub rate limit risk
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
