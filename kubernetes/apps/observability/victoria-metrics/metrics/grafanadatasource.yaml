---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: &name prometheus
  uid: 9b5c4385-3947-4fc8-bc9d-054d0a3b2ce1
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: prometheus
    name: *name
    access: proxy
    isDefault: true
    url: http://vmsingle-vmks.observability.svc.cluster.local:8428
