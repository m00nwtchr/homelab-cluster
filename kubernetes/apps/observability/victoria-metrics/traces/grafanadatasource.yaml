---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoriatraces
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: jaeger
    name: jaeger
    access: proxy
    jsonData:
      maxLines: 250
    url: http://vtsingle-vt.observability.svc.cluster.local:10428/select/jaeger
