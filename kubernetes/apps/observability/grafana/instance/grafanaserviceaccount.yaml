---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/grafana.integreatly.org/grafanaserviceaccount_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: &name grafana-mcp
spec:
  name: *name
  instanceName: grafana
  role: Editor
  isDisabled: false
  tokens:
    - name: mcp
      secretName: *name
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-mcp
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: mergei
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "toolhive"
