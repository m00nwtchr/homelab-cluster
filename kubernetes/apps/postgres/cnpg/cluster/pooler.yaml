---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/postgresql.cnpg.io/pooler_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-rw
spec:
  cluster:
    name: postgres

  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction

    authQuery: "SELECT $1, NULL"
    serverCASecret:
      name: root-ca
    serverTLSSecret:
      name: pooler-client-cert
    clientCASecret:
      name: pooler-client-cert
    clientTLSSecret:
      name: pooler-server-cert

    parameters:
      auth_type: cert
      server_tls_sslmode: verify-full
      client_tls_sslmode: verify-full

      max_client_conn: "1000"
      default_pool_size: "12"
      reserve_pool_size: "5"

      max_db_connections: "60"
      max_user_connections: "20"

      # timeouts / hygiene
      server_idle_timeout: "300" # close idle server conns after 5m
      server_login_retry: "5"
      query_wait_timeout: "30" # drop queued client if no server in 30s

      application_name_add_host: "1" # helps tracing through the pool

      # vikunja 2.4.0 (go-vikunja/vikunja#3156) pins search_path via the
      # lib/pq connection string. Pgbouncer 1.25.1 does NOT ignore
      # search_path by default and rejects it as "unsupported startup
      # parameter", which crashes every vikunja pod at startup. Drop
      # it silently so the search_path-via-options path is no-op
      # through the pool (the real fix would be to set the schema via
      # the user role, but vikunja is currently the only client that
      # sends this and we'd rather pool than reject).
      ignore_startup_parameters: search_path
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/postgresql.cnpg.io/pooler_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-rw-se
spec:
  cluster:
    name: postgres

  instances: 1
  type: rw
  pgbouncer:
    poolMode: session

    authQuery: "SELECT $1, NULL"
    serverCASecret:
      name: root-ca
    serverTLSSecret:
      name: pooler-client-cert
    clientCASecret:
      name: pooler-client-cert
    clientTLSSecret:
      name: pooler-server-cert

    parameters:
      # server_tls_protocols: tlsv1.3
      auth_type: cert
      server_tls_sslmode: verify-full
      client_tls_sslmode: verify-full

      max_client_conn: "1000"
      default_pool_size: "12"
      reserve_pool_size: "5"

      max_db_connections: "60"
      max_user_connections: "20"

      # timeouts / hygiene
      server_idle_timeout: "300" # close idle server conns after 5m
      server_login_retry: "5"
      query_wait_timeout: "30" # drop queued client if no server in 30s

      application_name_add_host: "1" # helps tracing through the pool

      # Mirror pooler-rw: see comment there about vikunja 2.4.0
      # and search_path.
      ignore_startup_parameters: search_path
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &name pooler-rw
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: *name
  podMetricsEndpoints:
    - port: metrics
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &name pooler-rw-se
spec:
  selector:
    matchLabels:
      cnpg.io/poolerName: *name
  podMetricsEndpoints:
