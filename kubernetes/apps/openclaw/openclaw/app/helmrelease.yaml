---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  values:
    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
            command:
              - /bin/sh
              - -c
              - |
                cp /tmp/openclaw.json /home/node/.openclaw/openclaw.json
                # Install the memini memory plugin from ClawHub, version-guarded:
                # only fetches when the pinned version differs from what's on the
                # persistent volume, so normal restarts stay offline.
                # renovate: datasource=github-tags depName=eleboucher/memini
                MEMINI_PLUGIN_VERSION=0.7.12
                if [ "$(cat "$HOME/.openclaw/extensions/memini/.clawver" 2>/dev/null)" != "$MEMINI_PLUGIN_VERSION" ]; then
                  if node dist/index.js plugins install "clawhub:@eleboucher/memini@$MEMINI_PLUGIN_VERSION" --pin --force; then
                    printf '%s' "$MEMINI_PLUGIN_VERSION" > "$HOME/.openclaw/extensions/memini/.clawver"
                  else
                    echo "WARN: memini plugin install failed; starting with whatever is present"
                  fi
                fi
                # Start gateway
                exec node dist/index.js gateway --bind lan
            env:
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              OPENCLAW_GATEWAY_PORT: &port 18789
              OPENCLAW_EXTENSION_API_PATH: /app/dist/extensionAPI.js
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz ${TZ}
            envFrom:
              - secretRef:
                  name: openclaw
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 10
                memory: 16Gi

          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: *tz
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/config",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /home/node/.openclaw
      home:
        forceRename: "openclaw-home"
        size: 5Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: *homepath

      config:
        type: configMap
        name: "openclaw-config"
        defaultMode: 0400
        globalMounts:
          - path: /tmp/openclaw.json
            subPath: openclaw.json

    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            # Broad read-only access across cluster resources. Secrets intentionally excluded.
            - apiGroups: [""]
              resources:
                [
                  "pods",
                  "pods/log",
                  "nodes",
                  "services",
                  "namespaces",
                  "configmaps",
                  "persistentvolumes",
                  "persistentvolumeclaims",
                  "endpoints",
                  "resourcequotas",
                  "limitranges",
                  "serviceaccounts",
                  "events",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources:
                [
                  "deployments",
                  "daemonsets",
                  "statefulsets",
                  "replicasets",
                  "controllerrevisions",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "ingressclasses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources:
                [
                  "storageclasses",
                  "csinodes",
                  "csidrivers",
                  "volumeattachments",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["policy"]
              resources: ["poddisruptionbudgets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources:
                ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiregistration.k8s.io"]
              resources: ["apiservices"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources:
                [
                  "gitrepositories",
                  "helmrepositories",
                  "ocirepositories",
                  "buckets",
                  "helmcharts",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources:
                ["externalsecrets", "secretstores", "clustersecretstores"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources:
                [
                  "prometheuses",
                  "alertmanagers",
                  "servicemonitors",
                  "podmonitors",
                  "prometheusrules",
                  "thanosrulers",
                  "probes",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources:
                [
                  "volumesnapshots",
                  "volumesnapshotcontents",
                  "volumesnapshotclasses",
                ]
              verbs: ["get", "list", "watch"]
        # Cluster-wide pod delete — restart any pod in any namespace
        openclaw-pod-delete-cluster-wide:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
        # Namespace-scoped exec + deploy patch — openclaw namespace only
        openclaw-exec-deploy-openclaw:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        # Cluster-wide binding for pod delete
        openclaw-pod-delete-cluster-wide:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-delete-cluster-wide
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        # Namespace-scoped binding for exec+deploy — openclaw namespace only
        openclaw-exec-deploy-openclaw:
          type: RoleBinding
          roleRef:
            identifier: openclaw-exec-deploy-openclaw
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
              namespace: openclaw
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      codeserver:
        hostnames: ["{{ .Release.Name }}-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: &codeserverPort 12321

    service:
      app:
        # type: LoadBalancer
        # annotations:
        #   lbipam.cilium.io/ips: 10.69.10.41
        # externalTrafficPolicy: Cluster
        ipFamilies: [IPv4]
        ports:
          http:
            port: *port
          codeserver:
            port: *codeserverPort
    serviceAccount:
      openclaw: {}
