---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kubevirt.io/virtualmachine_v1.json
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: &app ${APP}
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/size: medium
        kubevirt.io/domain: *app
    spec:
      domain:
        cpu:
          cores: 4
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              macAddress: "52:54:00:d0:0d:04"
        resources:
          requests:
            memory: 4Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: archlinux-root
        - name: cloudinitdisk
          cloudInitNoCloud:
            userDataBase64: 
