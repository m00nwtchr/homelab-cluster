# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tetragon
spec:
  interval: 1h
  url: https://helm.cilium.io
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tetragon
spec:
  interval: 1h
  # chartRef:
  #   kind: OCIRepository
  #   name: *app
  chart:
    spec:
      chart: *app
      version: 1.7.0
      sourceRef:
        kind: HelmRepository
        name: *app
  values:
    rthooks:
      enabled: true
      interface: oci-hooks
    tetragon:
      prometheus:
        serviceMonitor:
          enabled: true
    tetragonOperator:
      prometheus:
        serviceMonitor:
          enabled: true
