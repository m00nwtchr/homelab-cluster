---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: coredns
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/coredns/charts/coredns
  ref:
    tag: 1.45.2
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token.actions.githubusercontent.com$"
        subject: "^https://github.com/coredns/helm.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app coredns
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    isClusterService: true

    fullnameOverride: coredns
    image:
      #  repository: mirror.gcr.io/coredns/coredns
      repository: coredns/coredns
      tag: 1.14.2@sha256:e7e6440cfd1e919280958f5b5a6ab2b184d385bba774c12ad2a9e1e4183f90d9

    serviceAccount:
      create: true

    service:
      ipFamilyPolicy: "PreferDualStack"
      clusterIPs:
        - "2001:cafe:43::a"
        - 10.43.0.10
    prometheus:
      service:
        enabled: true
      monitor:
        enabled: true

    replicaCount: 2

    servers:
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: rewrite
            parameters: stop
            configBlock: |-
              name regex (.*\.tail096cd8\.ts\.net)\..*\.cluster\.local\. {1}.
              answer auto
          - name: forward
            parameters: tail096cd8.ts.net 2001:cafe:43::75

          - name: rewrite
            parameters: stop
            configBlock: |-
              name exact idm.${SECRET_DOMAIN}. kanidm.kanidm.svc.cluster.local.

          # - name: rewrite
          #   parameters: name substring idm.${SECRET_DOMAIN} external.network.svc.cluster.local
          - name: rewrite
            parameters: stop
            configBlock: |-
              name regex ^${SECRET_DOMAIN//./\\.}\..*\.cluster\.local\.$ kanidm.kanidm.svc.cluster.local.
              answer auto

          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          - name: autopath
            parameters: "@kubernetes"
          - name: forward
            parameters: . tls://1.1.1.1 tls://1.0.0.1 tls://2606:4700:4700::1111 tls://2606:4700:4700::1001
            configBlock: |-
              tls_servername one.one.one.one
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: :9153
          - name: log
            configBlock: |-
              class error

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists

    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
