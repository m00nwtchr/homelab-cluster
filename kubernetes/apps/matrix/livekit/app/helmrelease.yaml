---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app livekit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: livekit/livekit-server
              tag: v1.13.3@sha256:483b8b7b5b0654f91f1e8bdc7b46fcd37fd9911612ecf627f97e3185a89825bd
            env:
              LIVEKIT_CONFIG:
                valueFrom:
                  secretKeyRef:
                    name: livekit-config
                    key: config.yaml

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 18m
                memory: 154Mi
              limits:
                memory: 154Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      jwt:
        labels:
          m00nlit.dev/no-dragonfly-stunnel: "true"

        containers:
          app:
            image:
              repository: ghcr.io/element-hq/lk-jwt-service
              tag: 0.4.4@sha256:9c715697c6f7c1f538f2ee41b7b59b04a8d06bf790a7cc8c8517ccac8d28813d
            env:
              LIVEKIT_URL: wss://livekit.${MAIN_DOMAIN}
              LIVEKIT_KEY_FILE: /config/keys.yaml
              LIVEKIT_FULL_ACCESS_HOMESERVERS: "${SECRET_DOMAIN}"
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 8080
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 3
                  timeoutSeconds: 5
              readiness:
                enabled: true
                type: HTTP
                path: /healthz
                port: 8080
                spec:
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        forceRename: *app
        controller: *app
        ipFamilies:
          - IPv4
        ports:
          http:
            port: 80
            targetPort: 7880
          rtc-tcp:
            port: 7881
          metrics:
            port: 6789

      jwt:
        controller: jwt
        ports:
          http:
            port: 80
            targetPort: 8080

    serviceMonitor:
      app:
        serviceName: app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: tunnel
            namespace: network
          - name: internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: *app
                port: 80
          - matches:
              - path:
                  type: PathPrefix
                  value: /sfu/get
              - path:
                  type: PathPrefix
                  value: /healthz
              - path:
                  type: PathPrefix
                  value: /get_token
            backendRefs:
              - name: livekit-jwt
                port: 80

    persistence:
      keys:
        type: secret
        name: livekit-keys
        defaultMode: 0600
        globalMounts:
          - path: /config/keys.yaml
            subPath: keys.yaml
