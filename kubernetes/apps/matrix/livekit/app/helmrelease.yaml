---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app livekit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: livekit/livekit-server
              tag: v1.9.12@sha256:2c13cbf2edcbf13ea7b20d05c10b394d04d8fb3fe358269cff845a90b4de9576
            env:
              LIVEKIT_CONFIG:
                valueFrom:
                  secretKeyRef:
                    name: livekit-config
                    key: config.yaml

            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
            resources:
              requests:
                cpu: 18m
                memory: 154Mi
              limits:
                memory: 154Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      jwt:
        labels:
          m00nlit.dev/no-dragonfly-stunnel: "true"

        containers:
          app:
            image:
              repository: ghcr.io/element-hq/lk-jwt-service
              tag: 0.4.1@sha256:6beec945a59b9b8b02161d29884abc2c1e5af9a376c1a2ccabbec3e26b07cf0c
            env:
              LIVEKIT_URL: wss://livekit.${SECRET_DOMAIN}
              LIVEKIT_KEY_FILE: /config/keys.yaml
              LIVEKIT_FULL_ACCESS_HOMESERVERS: "${SECRET_DOMAIN}"
            probes:
              liveness: *probes
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        forceRename: *app
        controller: *app
        ipFamilies:
          - IPv4
        ports:
          http:
            port: 80
            targetPort: 7880
          rtc-tcp:
            port: 7881
          metrics:
            port: 6789

      jwt:
        controller: jwt
        ports:
          http:
            port: 80
            targetPort: 8080

    serviceMonitor:
      app:
        serviceName: app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: *app
                port: 80
          - matches:
              - path:
                  type: PathPrefix
                  value: /sfu/get
              - path:
                  type: PathPrefix
                  value: /healthz
              - path:
                  type: PathPrefix
                  value: /get_token
            backendRefs:
              - name: livekit-jwt
                port: 80

    persistence:
      keys:
        type: secret
        name: livekit-keys
        defaultMode: 0600
        globalMounts:
          - path: /config/keys.yaml
            subPath: keys.yaml
