---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app continuwuity
  namespace: &namespace matrix
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/kopiur/local
    - ../../../../components/gatus/external
    - ../../../../components/oidc
  dependsOn:
    - name: kopiur
      namespace: kopiur-system
  interval: 1h
  path: ./kubernetes/apps/matrix/continuwuity/app
  postBuild:
    substitute:
      APP: *app
      NAMESPACE: *namespace
      SUBDOMAIN: matrix

      OIDC_DISPLAY_NAME: "Matrix"
      OIDC_CALLBACK: /_continuwuity/oidc/complete

      KOPIUR_CAPACITY: 8Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
