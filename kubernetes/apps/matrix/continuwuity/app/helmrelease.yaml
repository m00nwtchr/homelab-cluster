---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app continuwuity
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      *app :
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: forgejo.ellis.link/continuwuation/continuwuity
              tag: sha-ad1c194
            env:
              CONDUWUIT_CONFIG: "/config/conduit.toml"
              CONDUWUIT_PORT: &port 8008

              CONTINUWUITY_OAUTH__OIDC__DISCOVERY_URL: "https://idm.${SECRET_DOMAIN}/oauth2/openid/{{ .Release.Name }}"
              CONTINUWUITY_OAUTH__OIDC__CLIENT_ID: *app
              CONTINUWUITY_OAUTH__OIDC__CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: "kanidm-{{ .Release.Name }}-oidc"
                    key: client-secret

              # CONDUWUIT_REGISTRATION_TOKEN:
              #   valueFrom:
              #     secretKeyRef:
              #       name: conduit-registration-secret
              #       key: token
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/client/versions
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
            resources:
              limits:
                cpu: 3
                memory: 512Mi
              requests:
                cpu: 10m
                memory: 512Mi
            securityContext:
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames: ["matrix.${SECRET_DOMAIN}"]
        forceRename: *app
        parentRefs:
          - name: tunnel
            namespace: network
          - name: internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: 80
            timeouts:
              request: "0s"

      well-known:
        hostnames: ["${SECRET_DOMAIN}"]
        parentRefs:
          - name: tunnel
            namespace: network
          - name: internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix/
            backendRefs:
              - identifier: app
                port: 80

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: *app

      media:
        size: 5Gi
        accessMode: ReadWriteOnce
        storageClass: zfs-vault
        suffix: "media"
        retain: true
        globalMounts:
          - path: /data/media

      backups:
        size: 5Gi
        accessMode: ReadWriteOnce
        suffix: "backups"
        globalMounts:
          - path: /backups

      config:
        type: configMap
        name: conduit-configmap
        globalMounts:
          - path: /config/conduit.toml
            subPath: conduit.toml
