---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.9.2
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  # verify:
  #   provider: cosign
  #   matchOIDCIdentity:
  #     - issuer: "^https://token.actions.githubusercontent.com$"
  #       subject: "^https://github.com/stacklok/toolhive.*$"
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kagent
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    # ------------------------------------------------------------------
    # Built-in agents we don't use. Disabling here (rather than
    # `kubectl delete`) is the durable removal: the Agent CRs are owned by
    # this HelmRelease, so Flux re-creates anything deleted out-of-band.
    # ------------------------------------------------------------------
    argo-rollouts-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    # ------------------------------------------------------------------
    # These agents are now deployed as SandboxAgents on substrate
    # (kagent/substrate-agents/) with Go runtime. Disable them here
    # to avoid conflicts — the chart can only render Python Agent CRs.
    # ------------------------------------------------------------------
    k8s-agent:
      enabled: false
    helm-agent:
      enabled: false
    promql-agent:
      enabled: false
    observability-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    istio-agent:
      enabled: false
    kgateway-agent:
      enabled: false

    ipv6:
      enabled: true
