---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app honcho
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      *app : &ct
        containers:
          app: &ctA
            image:
              repository: ghcr.io/plastic-labs/honcho
              tag: v3.0.11@sha256:423dc96fd3034408d66e5381c184c9ea824610acdb5581898dd00b0b1ab096d6
            command:
              - /bin/sh
              - -c
              - |
                set -e

                echo "Running database migrations..."
                /app/.venv/bin/python scripts/provision_db.py

                echo "Starting API server..."
                exec /app/.venv/bin/fastapi run --host "::" src/main.py
            env:
              DB_CONNECTION_URI: postgresql+psycopg://honcho@pooler-rw.postgres.svc:5432/honcho?sslmode=verify-full&sslcert=/var/run/secrets/postgresql/tls.crt&sslkey=/var/run/secrets/postgresql/tls.key&sslrootcert=/var/run/secrets/root-ca/ca.crt
              CACHE_URL: redis://localhost:6379/0?suppress=true
              CACHE_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 223m
                memory: 381Mi
              # limits:
              # memory: 256Mi
              limits:
                memory: 381Mi
        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile: {type: RuntimeDefault}
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch

      deriver:
        <<: *ct
        containers:
          app:
            <<: *ctA
            command: ["/app/.venv/bin/python", "-m", "src.deriver"]
            probes: {}
            resources:
              requests:
                cpu: 17m
                memory: 344Mi
              # limits:
              # memory: 256Mi

              limits:
                memory: 344Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network

    persistence:
      config:
        type: configMap
        name: honcho-configmap
        globalMounts:
          - path: /app/config.toml
            subPath: config.toml

      tmp:
        type: emptyDir
