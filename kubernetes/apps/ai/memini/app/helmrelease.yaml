---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      *app :
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: git.erwanleboucher.dev/eleboucher/memini
              tag: 0.5.12@sha256:82ba82907ce839e89455cd6894829ae52495648acd29e8afed307ca6b6925b0d
            env:
              MEMINI_HTTP_ADDR: ":8080"
              MEMINI_LOG_FORMAT: json
              MEMINI_BACKEND: postgres
              MEMINI_EMBED_BASE_URL: http://agentgateway-proxy.ai.svc.cluster.local./v1
              MEMINI_EMBED_MODEL: bge-m3
              MEMINI_EMBED_DIMS: 1024

              # MEMINI_RERANK: http://agentgateway-proxy.ai.svc.cluster.local./v1
              # MEMINI_RERANK_MODEL: bge-reranker-v2
              # MEMINI_RERANK_TOP_N: 10
              # MEMINI_RERANK_TIMEOUT: 3s

              # MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              # MEMINI_RECALL_MIN_SEMANTIC_SCORE: "0.46"

              MEMINI_LLM_BASE_URL: http://agentgateway-proxy.ai.svc.cluster.local./anthropic
              MEMINI_LLM_API_KEY: dummy
              MEMINI_LLM_API: anthropic
              MEMINI_LLM_MODEL: MiniMax-M2.7

              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_WRITE_DEDUP_SCORE: 0.9
              MEMINI_WRITE_DEDUP_ACTION: coalesce

              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: MEMINI_API_KEY
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *port

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
