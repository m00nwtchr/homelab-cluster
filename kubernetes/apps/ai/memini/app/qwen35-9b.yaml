---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen35-9b
spec:
  source: https://huggingface.co/unsloth/Qwen3.5-9B-GGUF/resolve/main/Qwen3.5-9B-Q4_K_M.gguf
  format: gguf
  quantization: Q4_K_M
  hardware:
    accelerator: cpu
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35-9b
spec:
  modelRef: qwen35-9b
  image: ghcr.io/ggml-org/llama.cpp:server
  replicas: 0
  priority: batch
  parallelSlots: 1

  flashAttention: true
  contextSize: 262144
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  moeCPUOffload: true

  extraArgs:
    - --host
    - "::"

  # resources:
  #   cpu: 500m
  #   memory: 1Gi

  endpoint:
    port: 8080
    type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qwen35-9b-proxy
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
    - port: 8080
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/keda.sh/scaledobject_v1alpha1.json
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: &app qwen35-9b
spec:
  scaleTargetRef:
    apiVersion: inference.llmkube.dev/v1alpha1
    kind: InferenceService
    name: *app
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 600
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda.svc.cluster.local.:9090
        interceptorRoute: *app
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/http.keda.sh/interceptorroute_v1beta1.json
apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: &app qwen35-9b
spec:
  target:
    service: *app
    port: 8080
  rules:
    - hosts: ["qwen35-9b-proxy.ai.svc.cluster.local"]
  scalingMetric:
    concurrency:
      targetValue: 100
