---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: minimax
spec:
  ai:
    provider:
      anthropic:
        model: MiniMax-M3
      host: api.minimax.io
      port: 443
  policies:
    auth:
      secretRef:
        name: agentgateway-minimax
    ai:
      routes:
        "/anthropic/v1/messages": "Messages"
        "/v1/responses": "Responses"
        "/v1/chat/completions": "Completions"
        "*": "Passthrough"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minimax
spec:
  parentRefs:
    - name: agentgateway-proxy
  rules:
    - backendRefs:
      - name: minimax
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app agentgateway-minimax
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: *app
    template:
      engineVersion: v2
      data:
        Authorization: "{{ .MINIMAX_API_KEY }}"
  dataFrom:
    - find:
        path: "/minimax"
