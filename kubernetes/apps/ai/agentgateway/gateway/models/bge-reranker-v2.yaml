---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/agentgateway.dev/agentgatewaybackend_v1alpha1.json
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: &model bge-reranker-v2
spec:
  ai:
    provider:
      custom:
        backendRef:
          name: *model
          port: 8080
        model: *model
        formats:
          - type: Embeddings
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &model bge-reranker-v2
spec:
  parentRefs:
    - name: agentgateway-proxy
  rules:
    - matches:
        - headers:
            - type: Exact
              name: X-Gateway-Base-Model-Name
              value: *model
      backendRefs:
        - name: *model
          group: agentgateway.dev
          kind: AgentgatewayBackend
