---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: bge-reranker-v2
spec:
  source: https://huggingface.co/Felladrin/gguf-Q8_0-bge-reranker-v2-m3/resolve/main/bge-reranker-v2-m3-q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: cpu
---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: &model bge-reranker-v2
spec:
  modelRef: *model
  image: ghcr.io/ggml-org/llama.cpp:server@sha256:295dc9897fa8a643e4a513fbcaada51d3b8db4b0afa4fda7aeae2386757de58b
  replicas: 0

  priority: batch
  contextSize: &ctx 8192
  batchSize: 8192
  uBatchSize: 8192
  parallelSlots: 1

  flashAttention: true
  cacheTypeK: q8_0
  cacheTypeV: q8_0

  extraArgs:
    - --alias
    - *model
    - --rerank
    - --pooling
    - rank
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "6"
    - --host
    - "::"

  # resources:
  #   cpu: 500m
  #   memory: 1Gi

  endpoint:
    port: 8080
    type: ClusterIP
