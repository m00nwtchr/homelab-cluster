---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app collabora
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  values:
    controllers:
      *app :
        containers:
          app:
            image:
              repository: collabora/code
              tag: 26.04.2.1.1@sha256:fece3a479b4ca57e7186d0c715155526170e337deef55bbbbbc79ee93b0e72e1
            command: [/bin/bash, -c]
            args: ["coolconfig generate-proof-key && /start-collabora-online.sh"]
            env:
              # aliasgroup1: "http://opencloud-wopi:9300"
              aliasgroup1: "https://wopi.${MAIN_DOMAIN}"
              DONT_GEN_SSL_CERT: "YES"
              extra_params: |
                --o:ssl.enable=false \
                --o:ssl.ssl_verification=true \
                --o:ssl.termination=true \
                --o:welcome.enable=false \
                --o:net.frame_ancestors=cloud.${SECRET_DOMAIN} \
                --o:net.lok_allow.host[14]=cloud.${SECRET_DOMAIN} \
                --o:home_mode.enable=false
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            # readinessProbe:
            #   httpGet:
            #     path: /hosting/discovery
            #     port: &port 9980
            #   periodSeconds: 15
            #   timeoutSeconds: 10
            #   failureThreshold: 5
            # livenessProbe:
            #   httpGet:
            #     path: /hosting/discovery
            #     port: 9980
            #   periodSeconds: 60
            #   timeoutSeconds: 10
            #   failureThreshold: 5

            resources:
              requests:
                cpu: 10m
                memory: 615Mi
              limits:
                memory: 615Mi
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: 9980

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${MAIN_DOMAIN}"]
        parentRefs:
          - name: tunnel
            namespace: network
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 80
