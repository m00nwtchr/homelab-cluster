---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/fluxcd.controlplane.io/resourceset_v1.json
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: cluster-apps
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "5m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/created-by: flux-operator
  inputsFrom:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSetInputProvider
      selector:
        matchLabels:
          app.kubernetes.io/name: cluster-apps-namespaces-inputs
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.namespace >>-apps
        namespace: flux-system
      spec:
        dependsOn:
          - name: cluster-meta
            namespace: flux-system
        decryption:
          provider: sops
        interval: 1h
        path: ./kubernetes/apps/<< inputs.namespace >>
        prune: true
        sourceRef:
          kind: GitRepository
          name: flux-system
          namespace: flux-system
        wait: false
        patches:
          - # enable sops decryption on all child kustomizations
            target:
              kind: kustomization
              version: v1
              group: kustomize.toolkit.fluxcd.io
            patch: |-
              - op: add
                path: /spec/decryption
                value:
                  provider: sops
