---
# yaml-language-server: $schema=https://raw.githubusercontent.com/controlplaneio-fluxcd/flux-operator/refs/heads/main/docs/schemas/resourceset_v1.json
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: cluster-apps
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "5m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/created-by: flux-operator
  inputs:
    - namespace: agentgateway-system
    - namespace: ai
    - namespace: automation
    - namespace: cert-manager
    - namespace: cnpg-system
    - namespace: crowdsec
    - namespace: database
    - namespace: default
    - namespace: dns
    - namespace: dragonfly-system
    - namespace: envoy-gateway-system
    - namespace: external-secrets
    - namespace: fediverse
    - namespace: flux-system
    - namespace: garage
    - namespace: gitea
    - namespace: hermes
    - namespace: infisical
    - namespace: kanidm
    - namespace: keda
    - namespace: kguardian
    - namespace: kopiur-system
    - namespace: kro-system
    - namespace: kube-system
    - namespace: kubevirt
    - namespace: kubewarden
    - namespace: llmkube-system
    - namespace: matrix
    - namespace: media
    - namespace: network
    - namespace: observability
    - namespace: observability-privileged
    - namespace: openclaw
    - namespace: opencloud
    - namespace: openebs-system
    - namespace: postgres
    - namespace: renovate
    - namespace: rssflow
    - namespace: stunner-system
    - namespace: tailscale
    - namespace: tekton-system
    - namespace: toolhive
    - namespace: tor
    - namespace: trivy-system
    - namespace: volsync-system
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.namespace >>-apps
        namespace: flux-system
      spec:
        components:
          - ../../components/common
        decryption:
          provider: sops
        dependsOn:
          - name: cluster-meta
            namespace: flux-system
        interval: 1h
        path: ./kubernetes/apps/<< inputs.namespace >>
        prune: true
        postBuild:
          substitute:
            NAMESPACE: << inputs.namespace >>
          substituteFrom:
            - name: cluster-secrets
              kind: Secret
        sourceRef:
          kind: GitRepository
          name: flux-system
          namespace: flux-system
        targetNamespace: << inputs.namespace >>
        wait: false
