# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: not-used
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              labelSelector: "m00nlit.dev/no-dragonfly-stunnel!=true"
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    volumes:
                      - name: dragonfly-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: dfguard-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/dns-names: ${APP}
                      - name: root-ca
                        configMap:
                          name: root-ca
                          defaultMode: 0440

                    initContainers:
                      - name: dragonfly-tunnel
                        restartPolicy: Always
                        image: ghcr.io/m00nwtchr/dfguard:rolling
                        args: ["tunnel"]
                        env:
                          - name: DFGUARD_TUNNEL_CERT
                            value: /var/run/secrets/dragonfly/tls.crt
                          - name: DFGUARD_TUNNEL_KEY
                            value: /var/run/secrets/dragonfly/tls.key
                          - name: DFGUARD_TUNNEL_CA
                            value: /var/run/secrets/root-ca/ca.crt
                          - name: DFGUARD_TUNNEL_UPSTREAM
                            value: dfguard.database.svc.cluster.local.:6379
                          - name: DFGUARD_TUNNEL_TCP_NODELAY
                            value: "true"
                        volumeMounts:
                          - name: dragonfly-certs
                            mountPath: /var/run/secrets/dragonfly
                            readOnly: true
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              labelSelector: "m00nlit.dev/no-dragonfly-stunnel!=true"
            patch: |-
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: ignored
              spec:
                template:
                  spec:
                    volumes:
                      - name: dragonfly-certs
                        csi:
                          driver: csi.cert-manager.io
                          readOnly: true
                          volumeAttributes:
                            csi.cert-manager.io/issuer-name: dfguard-client-ca
                            csi.cert-manager.io/issuer-kind: ClusterIssuer
                            csi.cert-manager.io/key-algorithm: ECDSA
                            csi.cert-manager.io/key-size: "384"
                            csi.cert-manager.io/key-encoding: PKCS8
                            csi.cert-manager.io/key-usages: client auth
                            csi.cert-manager.io/dns-names: ${APP}
                      - name: root-ca
                        configMap:
                          name: root-ca
                          defaultMode: 0440

                    initContainers:
                      - name: dragonfly-tunnel
                        restartPolicy: Always
                        image: ghcr.io/m00nwtchr/dfguard:rolling
                        args: ["tunnel"]
                        env:
                          - name: DFGUARD_TUNNEL_CERT
                            value: /var/run/secrets/dragonfly/tls.crt
                          - name: DFGUARD_TUNNEL_KEY
                            value: /var/run/secrets/dragonfly/tls.key
                          - name: DFGUARD_TUNNEL_CA
                            value: /var/run/secrets/root-ca/ca.crt
                          - name: DFGUARD_TUNNEL_UPSTREAM
                            value: dfguard.database.svc.cluster.local.:6379
                          - name: DFGUARD_TUNNEL_TCP_NODELAY
                            value: "true"
                        volumeMounts:
                          - name: dragonfly-certs
                            mountPath: /var/run/secrets/dragonfly
                            readOnly: true
                          - name: root-ca
                            mountPath: /var/run/secrets/root-ca
                            readOnly: true
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
