---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  repository:
    kind: ClusterRepository
    name: garage
  retention:
    keepDaily: 7
    keepHourly: 24
  compression:
    compressor: "zstd"
  sources:
    - pvc:
        name: ${APP}
  verification:
    deep:
      schedule:
        cron: H 5 1 * *
    quick:
      schedule:
        cron: H 3 * * *
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-zfs}
  mover:
    securityContext:
      capabilities: { drop: [ALL] }
      seccompProfile: { type: RuntimeDefault }
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: ${KOPIUR_PUID:=${PUID:=65532}}
      runAsGroup: ${KOPIUR_PGID:=${PGID:=65532}}
      fsGroup: ${KOPIUR_PGID:=${PGID:=65532}}
      fsGroupChangePolicy: OnRootMismatch
    # inheritSecurityContextFrom:
    #   pvcConsumer: {}
