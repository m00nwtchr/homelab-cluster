---
# yaml-language-server: $schema=https://k8s-schemas.m00nlit.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: ${SECRET_NAME:=${APP}}
  dataFrom:
    - find:
        path: "/${APP}"
