---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}-anubis
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      anubis:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/techarohq/anubis
              tag: v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
            env:
              BIND: ":8080"
              DIFFICULTY: '${ANUBIS_DIFFICULTY:="4"}'
              ED25519_PRIVATE_KEY_HEX:
                valueFrom:
                  secretKeyRef:
                    name: anubis-key
                    key: ED25519_PRIVATE_KEY_HEX
              METRICS_BIND: ":9090"
              OG_EXPIRY_TIME: "24h"
              OG_PASSTHROUGH: "true"
              POLICY_FNAME: "/etc/anubis/policy.yaml"
              SERVE_ROBOTS_TXT: "true"
              TARGET: "${ANUBIS_TARGET:=http://${ANUBIS_SERVICE:=${APP}}:${ANUBIS_PORT:=80}}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "anubis"
                      - "--healthcheck"
                  initialDelaySeconds: 1
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "anubis"
                      - "--healthcheck"
                  initialDelaySeconds: 1
                  periodSeconds: 5
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
    configMaps:
      policy:
        data:
          policy.yaml: |-
            bots:
              - import: (data)/meta/default-config.yaml
              - import: (data)/apps/gitea-rss-feeds.yaml
              - name: oci-registry
                path_regex: ^/v2/.*
                action: ALLOW
              - name: catch-all
                path_regex: .*
                action: CHALLENGE
                challenge:
                  algorithm: fast
                  difficulty: 4
            dnsbl: true
    service:
      anubis:
        ports:
          http:
            port: 80
            targetPort: 8080
            protocol: HTTP
          metrics:
            port: 9090
            protocol: HTTP
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
    persistence:
      policy:
        type: configMap
        name: ${APP}-anubis
        globalMounts:
          - path: /etc/anubis
            readOnly: true
